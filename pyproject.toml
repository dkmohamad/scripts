[project]
name = "scripts"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["evdev", "httpx", "python-dotenv"]

[project.scripts]
capture = "recorder.capture:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["recorder"]
